name: Deploy YGOcarder to Pages

on:
  push:
    branches: [ "main" ] # Triggers the build whenever you edit code

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Application
        run: npm run build

      - name: Deploy to gh-pages Branch 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite compiles everything into the 'dist' folder
          branch: gh-pages # Deploys the web app to a background branch
